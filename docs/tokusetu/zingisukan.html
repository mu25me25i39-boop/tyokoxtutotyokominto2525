<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ジンギスカン特設サイト</title>
  <link rel="stylesheet" href="../../../assets/css/music.css">
  
  <style>
    /* ベーススタイル */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #050510;
      font-family: sans-serif;
      overflow-x: hidden;
      padding-bottom: 160px !important; /* 下部ボタン用の余白 */
      position: relative;
    }

    /* うっすら背景画像を重ねるためのコンテナ */
    .bg-slider {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background-size: cover;
      background-position: center;
      transition: background-image 0.8s ease-in-out;
      opacity: 0.3;
    }

    /* 左右のクリック可能なエリア */
    .nav-side-zone {
      position: fixed;
      top: 0;
      width: 15vw;
      height: 100vh;
      z-index: 10;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.2);
      font-size: 2rem;
      user-select: none;
      transition: background 0.3s, color 0.3s;
    }
    .nav-side-zone:hover {
      background: rgba(0, 208, 255, 0.05);
      color: rgba(0, 208, 255, 0.6);
    }
    .nav-left { left: 0; }
    .nav-right { right: 0; }

    /* 中央のカード構造 */
    .card {
      height: auto !important;
      max-height: none !important;
      min-height: min-content;
      display: block !important;
      padding-bottom: 30px;
      background: rgba(10, 10, 25, 0.75);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 208, 255, 0.2);
      border-radius: 16px;
      position: relative;
      z-index: 5;
      box-shadow: 0 0 30px rgba(0, 208, 255, 0.1);
    }

    .card .music-wrapper {
      display: block !important;
      height: auto !important;
      max-height: none !important;
    }

    /* メインサイトタイトル（追加） */
    .site-main-title {
      text-align: center; 
      color: #ff007f; 
      text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f; 
      font-size: 2.2rem; 
      margin-top: 15px; 
      margin-bottom: 5px; 
      font-weight: bold;
    }

    /* 曲タイトルの光彩 */
    .content h2 {
      text-align: center;
      color: #fff;
      text-shadow: 0 0 10px #00d0ff, 0 0 20px #00d0ff;
      font-size: 1.5rem;
      margin-top: 0;
      margin-bottom: 25px;
    }

    /* 動画プレイヤー */
    .card .music-wrapper video { 
      width: 100% !important; 
      height: auto !important;
      max-height: 100% !important;
      object-fit: contain !important;
      aspect-ratio: 16 / 9 !important;
      border-radius: 12px; 
      margin-bottom: 25px;
      display: block !important;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
      background: #000;
    }
    
    /* 各曲の説明文エリア */
    .card .music-wrapper p { 
      margin: 25px 0 0 0;
      text-align: left;
      line-height: 1.6;
      color: #ddd;
      min-height: 80px; 
      transition: opacity 0.3s ease-in-out;
    }

    /* 複数曲エリア */
    .music-list-container {
      margin: 20px 0;
      background: rgba(0, 0, 0, 0.5); 
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(0, 208, 255, 0.15);
    }

    .music-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      transition: background 0.3s;
    }
    .music-item:last-child {
      border-bottom: none; 
    }

    /* 現在選択されている曲のハイライト */
    .music-item.active {
      background: rgba(0, 208, 255, 0.15);
      border-left: 3px solid #00d0ff;
    }

    .music-title {
      color: #888;
      font-size: 0.95rem;
      font-weight: bold;
      text-align: left;
      padding-right: 15px;
      transition: color 0.3s, text-shadow 0.3s;
    }
    .music-item.active .music-title {
      color: #00d0ff;
      text-shadow: 0 0 5px rgba(0, 208, 255, 0.6);
    }

    /* DOWNLOADボタン */
    .music-item .download-link {
      display: inline-block !important;
      width: auto !important;
      min-width: 110px !important;
      text-align: center !important;
      margin: 0 !important;           
      padding: 8px 15px !important;
      font-size: 0.8rem !important;
      white-space: nowrap !important;
      box-sizing: border-box !important;
      color: #00d0ff;
      border: 1px solid #00d0ff;
      text-decoration: none;
      border-radius: 4px;
      background: rgba(0,0,0,0.3);
      transition: 0.2s;
    }
    .music-item .download-link:hover {
      background: #00d0ff;
      color: #000;
    }

    /* SNSリンクまとめボタン */
    .sns-links-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sns-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.2s, transform 0.2s;
      color: #fff;
    }

    .sns-btn.twitter  { background: #14171A; border: 1px solid #333; }
    .sns-btn.kick     { background: #53fc18; color: #000; }
    .sns-btn.tiktok   { background: #010101; border: 1px solid #ee1d52; }

    .sns-btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    /* 下部ナビゲーションボタン */
    .fixed-footer-nav {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 1000;
      width: max-content;
    }
    
    .fixed-footer-nav a {
      display: inline-block;
      padding: 10px 20px;
      color: #00d0ff;
      border: 2px solid #00d0ff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.8);
      box-shadow: 0 0 10px #00d0ff, 0 0 20px #00d0ff inset;
      transition: 0.2s;
      white-space: nowrap;
    }
    
    .fixed-footer-nav a:hover {
      background: #00d0ff;
      color: #000;
      box-shadow: 0 0 20px #00d0ff, 0 0 30px #00d0ff inset;
    }

    @media (max-width: 768px) {
      .card { width: 90vw !important; }
      .nav-side-zone { width: 10vw; font-size: 1.2rem; }
      .sns-links-container { flex-wrap: wrap; }
      .site-main-title { font-size: 1.8rem; }
    }
  </style>
</head>

<body>

<!-- うっすら背景が映るスライダー -->
<div class="bg-slider" id="bgSlider"></div>

<!-- 左右のクリックエリア -->
<div class="nav-side-zone nav-left" onclick="changeTrack(-1)">◀</div>
<div class="nav-side-zone nav-right" onclick="changeTrack(1)">▶</div>

<div class="gallery">
  <div class="card" style="width: min(850px, 95vw);">
    <div class="content">
      
      <!-- 特設サイトメインタイトル（お勧め配置） -->
      <h1 class="site-main-title">ジンギスカン特設サイト</h1>

      <!-- 曲名タイトル（JSで動的変更） -->
      <h2 id="mainTitle">01. 30〜70歳のワンチャン</h2>

      <div class="music-wrapper">
        
        <!-- 動画プレイヤー（JSで動的変更） -->
        <video id="mainVideo" src="o-dexisyon.webm" controls></video>

        <!-- 曲リスト一覧 -->
        <div class="music-list-container">
          
          <div class="music-item active" id="item-0">
            <span class="music-title">01.30〜70歳のワンチャン</span>
            <a href="o-dexisyon.aac" target="_blank" class="download-link">DOWNLOAD</a>
          </div>

          <div class="music-item" id="item-1">
            <span class="music-title">02.砂糖水</span>
            <a href="愛殺02.aac" target="_blank" class="download-link">DOWNLOAD</a>
          </div>

          <div class="music-item" id="item-2">
            <span class="music-title">03. 愛殺 -Caged Bird-</span>
            <a href="愛殺03.aac" target="_blank" class="download-link">DOWNLOAD</a>
          </div>

        
        </div>

        <!-- 各曲の説明文エリア（JSで動的変更） -->
        <p id="mainDescription">
          世界はいつか消える。だからこそ、消える前の一瞬にすべてを賭ける。ネオンの光、溶ける氷、青白い画面の光景が織りなす現代の孤独の中で、語り手は「君」という毒に身を委ねる。依存と独占欲が混ざり合い、愛は自己を溶かしていく。生きることよりも、君と溺れる刹那を選ぶ者たちの物語。
        </p>

        <!-- SNSリンクまとめボタン -->
        <div class="sns-links-container">
          <a href="https://x.com/zingisukan_2525" target="_blank" class="sns-btn twitter">X (Twitter)</a>
          <a href="https://www.tiktok.com/@zingisukan_kick?is_from_webapp=1&sender_device=pc" target="_blank" class="sns-btn kick">Kick</a>
          <a href="https://www.tiktok.com/@zingisukan_kick?is_from_webapp=1&sender_device=pc" target="_blank" class="sns-btn tiktok">TikTok</a>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- 下部固定ナビゲーションボタン -->
<div class="fixed-footer-nav">
  <a href="../../../index.html">トップページ</a>
  <a href="../../../music.html">音楽素材</a>
</div>

<script>
  // 各トラックのデータ管理（説明文を各曲固有のものへ変換可能）
  const tracks = [
    {
      title: "01. 30〜70歳のワンチャン",
      video: "o-dexisyon.webm",
      bg: "../../img/hero-miku.jpg",
      description: "2026.6.18 彼女オーディション開催！のテーマソング。"
    },
    {
      title: "02. 愛殺 -Sacrifice-",
      video: "02-2.webm",
      bg: "../../img/hero-miku2.jpg",
      description: "【02. 曲説明文】ここにSacrifice（サクリファイス）バージョンの独自テキストを記述します。アレンジの違いや、曲調に込めたもうひとつのストーリーなどを自由に書き換えてください。"
    },
    {
      title: "03. 愛殺 -Caged Bird-",
      video: "02-3.webm",
      bg: "../../img/hero-miku3.jpg",
      description: "【03. 曲説明文】ここにCaged Bird（籠の鳥）バージョンの独自テキストを記述します。囚われた感情や、静かに狂っていくメロディの背景にある世界観を表現する文章に変えてください。"
    },
    {
      title: "04. 愛殺 -End of the World-",
      video: "02-4.webm",
      bg: "../../img/hero-miku4.jpg",
      description: "【04. 曲説明文】ここにEnd of the World（世界の終わり）バージョンの独自テキストを記述します。崩壊していく世界と、最後に残る2人の結末を連想させる終末感の漂う紹介文などに向いています。"
    }
  ];

  let currentIndex = 0;

  function initTrack() {
    updateDOM();
  }

  function changeTrack(direction) {
    currentIndex += direction;
    
    if (currentIndex >= tracks.length) {
      currentIndex = 0;
    } else if (currentIndex < 0) {
      currentIndex = tracks.length - 1;
    }

    updateDOM();
  }

  function updateDOM() {
    const currentData = tracks[currentIndex];

    // 1. タイトルの変更
    document.getElementById('mainTitle').innerText = currentData.title;

    // 2. 動画の変更
    const videoEl = document.getElementById('mainVideo');
    videoEl.src = currentData.video;
    videoEl.load();

    // 3. 説明文の変更（フェード付き）
    const descEl = document.getElementById('mainDescription');
    descEl.style.opacity = 0;
    setTimeout(() => {
      descEl.innerText = currentData.description;
      descEl.style.opacity = 1;
    }, 200);

    // 4. リストのハイライト適用
    for (let i = 0; i < tracks.length; i++) {
      const item = document.getElementById(`item-${i}`);
      if (i === currentIndex) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    }

    // 5. 背景画像の変更
    document.getElementById('bgSlider').style.backgroundImage = `url('${currentData.bg}')`;
  }

  window.onload = initTrack;
</script>

</body>
</html>
