<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ラプラスのアーカイブ</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: sans-serif;
  background: #f5f5f5;
  text-align: center;
}

h1 {
  margin-top: 40px;
  font-size: 28px;
}

.card-wrap {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 40px 0;
}

.card {
  width: 260px;
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  text-decoration: none;
  color: #000;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.25);
}

.card-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 6px;
}

.card-desc {
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<h1>ラプラスのアーカイブ</h1>

<div class="card-wrap">

  <!-- 画像 A -->
  <a class="card" href="image/a.html">
    <div class="card-title">画像 A</div>
    <div class="card-desc">イラスト・写真など</div>
  </a>

  <!-- 画像 B -->
  <a class="card" href="image/b.html">
    <div class="card-title">画像 B</div>
    <div class="card-desc">GIF・生成画像など</div>
  </a>

  <!-- 音楽 A -->
  <a class="card" href="music/a.html">
    <div class="card-title">音楽 A</div>
    <div class="card-desc">ボーカル曲</div>
  </a>

  <!-- 音楽 B -->
  <a class="card" href="music/b.html">
    <div class="card-title">音楽 B</div>
    <div class="card-desc">BGM素材</div>
  </a>

  <!-- ブログ A -->
  <a class="card" href="blog/a.html">
    <div class="card-title">ブログ A</div>
    <div class="card-desc">技術系（Windows / Android）</div>
  </a>

  <!-- ブログ B -->
  <a class="card" href="blog/b.html">

  </a>

</div>

</html>
