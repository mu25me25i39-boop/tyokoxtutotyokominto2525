<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ラプラスのアーカイブ</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 20px;
  background: #f5f5f5;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

/* アコーディオン */
details {
  background: #fff;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* カード配置 */
.card-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  margin-top: 15px;
}

/* カード本体 */
.card {
  flex: 1;
  min-width: 120px;
  background: #fafafa;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
  text-decoration: none;
  color: #000;
  box-shadow: 0 3px 8px rgba(0,0,0,0.15);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.25);
}

.card-title {
  font-weight: bold;
  margin-bottom: 5px;
  font-size: 16px;
}

.card-desc {
  font-size: 13px;
  opacity: 0.7;
}
</style>
  <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<h1>ラプラスのアーカイブ</h1>

<!-- 概要 -->
<details>
  <summary>このサイトの説明</summary>
  <p>創作と記録をまとめたアーカイブサイトです。</p>
</details>

<!-- フリー画像 -->
<details>
  <summary>フリー画像</summary>
  <div class="card-wrap">
    <a class="card" href="images/a.html">
      <div class="card-title">画像A</div>
      <div class="card-desc">イラスト・写真</div>
    </a>
    <a class="card" href="images/b.html">
      <div class="card-title">画像B</div>
      <div class="card-desc">GIF・生成画像</div>
    </a>
  </div>
</details>

<!-- フリー音楽 -->
<details>
  <summary>フリー音楽</summary>
  <div class="card-wrap">
    <a class="card" href="music/a.html">
      <div class="card-title">音楽A</div>
      <div class="card-desc">ボーカル曲</div>
    </a>
    <a class="card" href="music/b.html">
      <div class="card-title">音楽B</div>
      <div class="card-desc">BGM素材</div>
    </a>
  </div>
</details>

<!-- ブログ -->
<details>
  <summary>ブログ</summary>
  <div class="card-wrap">
    <a class="card" href="blog/a.html">
      <div class="card-title">ブログA</div>
      <div class="card-desc">技術系</div>
    </a>
    <a class="card" href="blog/b.html">
      <div class="card-title">ブログB</div>
      <div class="card-desc">日常・その他</div>
    </a>
  </div>
</details>

</body>
</html>
