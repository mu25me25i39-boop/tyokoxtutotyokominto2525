<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音楽ギャラリー｜単曲ページ</title>
  <link rel="stylesheet" href="../../../assets/css/music.css">
  
  <style>
    /* 【高さの修正】
       高さを固定（max-heightなど）するのを完全にやめました。
       中身の動画や曲リスト、文章のボリュームに応じて、カードが下方向へ自然に伸びるようになります。
    */
    .card {
      height: auto !important;
      max-height: none !important;
      min-height: min-content;
      display: block !important;
      padding-bottom: 40px; /* カード最下部と文章の間に適切な余白を確保 */
    }

    /* 内包エリアもスクロールバーを出さず、そのまま下へ突き抜けるように展開 */
    .card .detail {
      display: block !important;
      height: auto !important;
      max-height: none !important;
      overflow: visible !important; /* スクロールバーを完全撤去 */
      opacity: 1 !important;
    }

    .card .detail video { 
      width: 100%; 
      border-radius: 12px; 
      margin-bottom: 25px;
    }
    
    .card .detail p { 
      margin: 25px 0 0 0;
      text-align: left;
      line-height: 1.6;
    }

    /* --- 複数曲ダウンロードリスト用のスタイル --- */
    .music-list-container {
      margin: 20px 0;
      background: rgba(0, 0, 0, 0.4); 
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(0, 208, 255, 0.15);
    }

    .music-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .music-item:last-child {
      border-bottom: none; 
    }

    .music-title {
      color: #00d0ff;
      font-size: 0.95rem;
      font-weight: bold;
      text-shadow: 0 0 5px rgba(0, 208, 255, 0.6);
      text-align: left;
      padding-right: 15px;
    }

    /* DOWNLOADボタンが長く伸びるのを防ぐ設定 */
    .music-item .download-link {
      display: inline-block !important;
      width: auto !important;
      min-width: 110px !important;
      text-align: center !important;
      margin: 0 !important;           
      padding: 8px 15px !important;
      font-size: 0.8rem !important;
      white-space: nowrap !important;
      box-sizing: border-box !important;
    }

    /* --- 下部ナビゲーションボタン（位置を最適化） --- */
    .fixed-footer-nav {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 1000;
      width: max-content;
    }
    
    .fixed-footer-nav a {
      display: inline-block;
      padding: 10px 20px;
      color: #00d0ff;
      border: 2px solid #00d0ff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.6);
      box-shadow: 0 0 10px #00d0ff, 0 0 20px #00d0ff inset;
      transition: 0.2s;
      white-space: nowrap;
    }
    
    .fixed-footer-nav a:hover {
      background: #00d0ff;
      color: #000;
      box-shadow: 0 0 20px #00d0ff, 0 0 30px #00d0ff inset;
    }

    /* 縦に長くなったカードが最下部の固定ボタンと重なって文字が読めなくなるのを防ぐ余白 */
    body {
      padding-bottom: 120px !important;
    }
  </style>
</head>

<body>

<div class="gallery">

  <div class="card" data-bg="../../img/hero-miku.jpg" style="width: min(900px, 95vw);">
    <div class="overlay"></div>

    <div class="content">
      <h2>溶けるピンクと孤独な夜</h2>

      <div class="愛殺">

        <video src="02-1.webm" controls></video>

        <div class="music-list-container">
          
          <div class="music-item">
            <span class="music-title">01. 溶けるピンクと孤独な夜</span>
            <a href="溶けるピンクと孤独な夜.mp3" target="_blank" class="download-link">DOWNLOAD</a>
          </div>

          <div class="music-item">
            <span class="music-title">02. 愛殺 (2026 Remaster)</span>
            <a href="愛殺.mp3" target="_blank" class="download-link">DOWNLOAD</a>
          </div>

          <div class="music-item">
            <span class="music-title">03. 孤独な夜の残り香</span>
            <a href="孤独な夜の残り香.mp3" target="_blank" class="download-link">DOWNLOAD</a>
          </div>

        </div>

        <p>
          世界はいつか消える。だからこそ、消える前の一瞬にすべてを賭ける。ネオンの光、溶ける氷、青白い画面の光景が織りなす現代の孤独の中で、語り手は「君」という毒に身を委ねる。依存と独占欲が混ざり合い、愛は自己を溶かしていく。生きることよりも、君と溺れる刹那を選ぶ者たちの物語。
        </p>

      </div>
    </div>
  </div>

</div>

<div class="fixed-footer-nav">
  <a href="../../../index.html">トップページ</a>
  <a href="../../../music.html">音楽素材</a>
</div>

</body>
</html>
