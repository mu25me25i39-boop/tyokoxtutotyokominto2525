<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音楽ギャラリー｜単曲ページ</title>
  <link rel="stylesheet" href="../../../assets/css/music.css">
  
  <style>
    /* カード内を上から順番に強制整列 */
    .card .content {
      display: flex;
      flex-direction: column;
    }
    .card .content h2 { order: 1; }
    .card .toggle-btn { order: 2; margin-bottom: 15px; }
    .card .detail { 
      order: 3; 
      display: flex;
      flex-direction: column;
    }
    
    /* 開いた時の中身の並び順 [1.動画 → 2.文脈 → 3.ダウンロード] */
    .card .detail video { order: 1; }
    .card .detail p { order: 2; }
    .card .detail a { order: 3; }

    /* 【スクロール対応】文脈が長くなっても下部ボタンを押し出さないよう、スクロールで読めるように制限 */
    .card .detail p {
      max-height: 150px;  /* 長い文章の最大高さ。これを超えるとスクロールになります */
      overflow-y: auto;   /* 縦スクロールを表示 */
      padding-right: 8px;
      text-align: left;   /* 長文を読みやすくするため左寄せに設定 */
      margin: 10px 0 15px 0;
    }

    /* 下部の2つのボタンを、前回の「ホームに戻る」と同じ仕様で画面中央最下部に並べる設定 */
    .fixed-footer-nav {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 1000;
      width: max-content;
    }
    /* もともとの .back-home（または footerリンク）のネオンデザインを2つに等しく流用 */
    .fixed-footer-nav a {
      display: inline-block;
      padding: 10px 20px;
      color: #00d0ff;
      border: 2px solid #00d0ff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.6);
      box-shadow: 0 0 10px #00d0ff, 0 0 20px #00d0ff inset;
      transition: 0.2s;
      white-space: nowrap;
    }
    .fixed-footer-nav a:hover {
      background: #00d0ff;
      color: #000;
      box-shadow: 0 0 20px #00d0ff, 0 0 30px #00d0ff inset;
    }
  </style>
</head>

<body>

<div class="gallery">

  <div class="card" data-bg="../../img/hero-miku.jpg" style="width: min(900px, 95vw);">
    <div class="overlay"></div>

    <div class="content">
      <h2>溶けるピンクと孤独な夜</h2>

      <button class="toggle-btn">▼ 詳細を開く</button>

      <div class="detail">

        <video src="01-1.mp4"
               controls
               style="width:100%; border-radius:12px; margin-bottom:15px;">
        </video>

        <p>
          世界はいつか消える。だからこそ、消える前の一瞬にすべてを賭ける。ネオンの光、溶ける氷、青白い画面の光景が織りなす現代の孤独の中で、語り手は「君」という毒に身を委ねる。依存と独占欲が混ざり合い、愛は自己を溶かしていく。生きることよりも、君と溺れる刹那を選ぶ者たちの物語。
        </p>

        <a href="溶けるピンクと孤独な夜.mp3" target="_blank" class="download-link">DOWNLOAD</a>

      </div>
    </div>
  </div>

</div>

<script>
const defaultBg = "url('../assets/cover.webp')";

// 背景画像を overlay に適用
document.querySelectorAll('.card').forEach(card => {
  const bg = card.dataset.bg;
  if (bg) card.querySelector('.overlay').style.backgroundImage = `url(${bg})`;
});

// 詳細ボタン（開閉 + 文字切り替え + 背景変更）
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const card = btn.closest('.card');
    const bg = card.dataset.bg;

    if (card.classList.contains('expanded')) {
      card.classList.remove('expanded');
      btn.textContent = '▼ 詳細を開く'; // 閉じたら文字を戻す
      document.body.style.backgroundImage = defaultBg;
      return;
    }

    document.querySelectorAll('.card.expanded').forEach(openCard => {
      openCard.classList.remove('expanded');
      const otherBtn = openCard.querySelector('.toggle-btn');
      if (otherBtn) otherBtn.textContent = '▼ 詳細を開く';
    });

    card.classList.add('expanded');
    btn.textContent = '▲ 閉じる'; // 開いたら文字を「閉じる」に変える
    if (bg) document.body.style.backgroundImage = `url(${bg})`;
  });
});
</script>

<div class="fixed-footer-nav">
  <a href="../../../index.html">トップページ</a>
  <a href="../../../music.html">音楽素材</a>
</div>

</body>
</html>
