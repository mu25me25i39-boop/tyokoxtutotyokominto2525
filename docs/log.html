<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>未来人ニュースフィード</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #news-container { margin-top: 20px; }
        .news-item { border-bottom: 1px solid #ccc; padding: 10px 0; }
        .news-item a { text-decoration: none; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <h1>未来人に関する最新ニュース</h1>
    <div id="news-container">読み込み中...</div>

    <script>
        // RSSフィードをJSONに変換するサービス(rss2json)を使用
        const rssUrl = 'https://news.google.com/rss/search?q=未来人&hl=ja&gl=JP&ceid=JP:ja';
        const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

        fetch(api)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('news-container');
                container.innerHTML = ''; // ローディング表示を消す
                
                data.items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `<a href="${item.link}" target="_blank">${item.title}</a><br><small>${item.pubDate}</small>`;
                    container.appendChild(div);
                });
            })
            .catch(err => {
                document.getElementById('news-container').innerText = 'ニュースの取得に失敗しました。';
                console.error(err);
            });
    </script>
</body>
</html>
