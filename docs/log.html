<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 20px; }
        .item { padding: 15px; border-left: 5px solid #007bff; background: #f9f9f9; margin-bottom: 10px; border-radius: 4px; }
        .item:hover { background: #eef6ff; }
        .title { font-weight: bold; display: block; margin-bottom: 5px; }
        .tag { font-size: 0.8rem; background: #eee; padding: 2px 8px; border-radius: 10px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 世界の災害リアルタイム速報</h1>
    <div id="feed">取得中...</div>
</div>

<script>
    const rssUrl = 'https://www.gdacs.org/xml/rss.xml';
    fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`)
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('feed');
            container.innerHTML = data.items.map(item => {
                // タイトルから国名を推測（末尾のin ~ を取得）
                const match = item.title.match(/in (.*)$/);
                const country = match ? match[1] : '世界';
                return `
                    <div class="item">
                        <span class="tag">📍 ${country}</span>
                        <a href="${item.link}" target="_blank" class="title">${item.title}</a>
                    </div>
                `;
            }).join('');
        });
</script>
</body>
</html>
