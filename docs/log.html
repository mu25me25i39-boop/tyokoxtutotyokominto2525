<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ジンギスカン情報ダッシュボード</title>
    <style>
        body { font-family: 'Helvetica Neue', sans-serif; background: #f4f4f9; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .feed-item { margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #eee; }
        a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

    <h1>ジンギスカン リアルタイム・フィード</h1>
    <div class="grid">
        <!-- 配信者情報の取得エリア -->
        <div class="card" id="streamer-feed">
            <h2>配信者：ジンギスカン</h2>
            <div class="content">読み込み中...</div>
        </div>

        <!-- 一般ニュース情報の取得エリア -->
        <div class="card" id="news-feed">
            <h2>グルメ・ニュース</h2>
            <div class="content">読み込み中...</div>
        </div>
    </div>

    <script>
        // RSSフィードURL（例：ニコニコ生放送やニュースRSS）
        const feeds = {
            streamer: 'https://api.rss2json.com/v1/api.json?rss_url=https://sp.live.nicovideo.jp/search?keyword=ジンギスカン&rss=1',
            news: 'https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=ジンギスカン&hl=ja&gl=JP'
        };

        async function fetchFeed(url, elementId) {
            try {
                const res = await fetch(url);
                const data = await res.json();
                const container = document.querySelector(`#${elementId} .content`);
                container.innerHTML = data.items.slice(0, 5).map(item => `
                    <div class="feed-item">
                        <a href="${item.link}" target="_blank">${item.title}</a><br>
                        <small>${new Date(item.pubDate).toLocaleString()}</small>
                    </div>
                `).join('');
            } catch (e) {
                document.querySelector(`#${elementId} .content`).innerText = "読み込みエラー";
            }
        }

        fetchFeed(feeds.streamer, 'streamer-feed');
        fetchFeed(feeds.news, 'news-feed');
    </script>
</body>
</html>
