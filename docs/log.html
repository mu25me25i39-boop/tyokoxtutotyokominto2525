<!DOCTYPE html>
<html lang="ja">
<head>

    <title>闇バイト情報 リアルタイム</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #d32f2f; font-size: 1.5rem; }
        /* 埋め込み用フレーム */
        iframe { width: 100%; height: 500px; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>⚠️ 闇バイト情報 リアルタイム監視</h1>
        <p>以下のソースはGoogleニュースの検索結果を直接埋め込んでいます。</p>
        
        <!-- Googleニュース検索結果を直接埋め込み -->
        <iframe src="https://news.google.com/search?q=闇バイト&hl=ja&gl=JP&ceid=JP:ja"></iframe>
    </div>
</div>

</body>
</html>
