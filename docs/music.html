<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音楽ギャラリー｜無料ダウンロード素材集</title>
  <link rel="stylesheet" href="music.css">
</head>

<body>

<header>
  <h1>音楽ギャラリー</h1>
  <p>商用利用もOK！無料で使える音楽素材をどうぞ。</p>
</header>

<div class="gallery">

  <!-- ▼ カード1 -->
  <div class="card" data-bg="/assets/img/MUSIC01.png">
    <div class="overlay"></div>
    <div class="content">
      <h2>囚ワレノ花</h2>
      <button class="toggle-btn">▼ 詳細を見る</button>

      <div class="detail">
        <p>狂おしいほどの独占欲に囚われた少女が、愛する彼女を甘美な檻に閉じ込める耽美な物語。</p>
        <a href="../videos/囚ワレノ花.mp4" target="_blank">歌詞付き</a>
        <a href="../music/囚ワレノ花.mp3" target="_blank">音声DL</a>
        <button class="close-btn">▲ 閉じる</button>
      </div>
    </div>
  </div>

  <!-- ▼ カード2 -->
  <div class="card" data-bg="../assets/thumb_10.webp">
    <div class="overlay"></div>
    <div class="content">
      <h2>きみのいない午後</h2>
      <button class="toggle-btn">▼ 詳細を見る</button>

      <div class="detail">
        <p>失われた温もりを抱きしめながら、午後の静寂に馴染んでいく哀惜の物語。</p>
        <a href="../videos/きみのいない午後.mp4" target="_blank">歌詞付き</a>
        <a href="../music/きみのいない午後.mp3" target="_blank">音声DL</a>
        <button class="close-btn">▲ 閉じる</button>
      </div>
    </div>
  </div>

</div>

<!-- ▼ JS（HTML 内に残す） -->
<script>
const defaultBg = "url('../assets/cover.webp')";

// 背景画像を overlay に適用
document.querySelectorAll('.card').forEach(card => {
  const bg = card.dataset.bg;
  card.querySelector('.overlay').style.backgroundImage = `url(${bg})`;
});

// 詳細ボタン（開閉 + 背景変更）
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const card = btn.closest('.card');
    const bg = card.dataset.bg;

    // すでに開いている → 閉じる
    if (card.classList.contains('expanded')) {
      card.classList.remove('expanded');
      document.body.style.backgroundImage = defaultBg;
      return;
    }

    // 他のカードを閉じる
    document.querySelectorAll('.card.expanded').forEach(openCard => {
      openCard.classList.remove('expanded');
    });

    // このカードを開く
    card.classList.add('expanded');

    // ページ全体の背景を更新
    document.body.style.backgroundImage = `url(${bg})`;
  });
});

// 閉じるボタン
document.querySelectorAll('.close-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const card = btn.closest('.card');
    card.classList.remove('expanded');

    // 背景を元に戻す
    document.body.style.backgroundImage = defaultBg;
  });
});
</script>

  <a href="../index.html">トップページ</a>
  <a href="music.html">音楽素材</a>

</div>

</body>
</html>
