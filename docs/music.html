<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音楽ギャラリー｜無料ダウンロード素材集</title>
  <link rel="stylesheet" href="assets/css/music.css">
</head>

<body>

<header>
  <h1>音楽ギャラリー</h1>
  <p>商用利用もOK！無料で使える音楽素材をどうぞ。</p>
</header>

<div class="gallery">

  <div class="card" data-bg="assets/img/MUSIC01.png">
    <div class="mask"></div>
    <div class="overlay"></div>
    <div class="content">
      <h2>刹那の溺死：虚無への情景</h2>
      <button class="toggle-btn">▼ 詳細を見る</button>
      <div class="detail">
        <p>いずれ消え去る世界で、消え去る存在のまま、消え去る者同士が交わす究極の執着。「君」という深淵へ溺れる過程を、それぞれの局面から切り取った記録。救いなどない、意味などいらない。ただ、崩壊する瞬間の眩しさと痛みを刻み付けるための物語。</p>
        <a href="https://mu25me25i39-boop.github.io/tyokoxtutotyokominto2525/assets/music/202602/01.html" target="_blank">音の世界へ</a>
      </div>
    </div>
  </div>

  <div class="card" data-bg="assets/img/MUSIC02.png">
    <div class="mask"></div>
    <div class="overlay"></div>
    <div class="content">
      <h2>愛殺</h2>
      <button class="toggle-btn">▼ 詳細を見る</button>
      <div class="detail">
        <p>依存と独占欲が混ざり合い、愛は自己を溶かしていく。</p>
        <a href="https://mu25me25i39-boop.github.io/tyokoxtutotyokominto2525/assets/music/202603/01.html" target="_blank">音の世界へ</a>
      </div>
    </div>
  </div>

</div>

<script>
const defaultBg = "#000 url('assets/img/hero-miku.jpg') center center / cover no-repeat fixed";

// 初期背景画像の読み込み
document.querySelectorAll('.card').forEach(card => {
  const bg = card.dataset.bg;
  const overlay = card.querySelector('.overlay');
  if (overlay && bg) overlay.style.backgroundImage = `url(${bg})`;
});

// ボタンのトグル処理
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const card = btn.closest('.card');
    const bg = card.dataset.bg;
    
    // 自分がすでに開いているかチェック
    const isExpanded = card.classList.contains('expanded');
    
    // 他の開いているカードをすべて閉じ、ボタンの文字も元に戻す
    document.querySelectorAll('.card.expanded').forEach(c => {
      c.classList.remove('expanded');
      const tBtn = c.querySelector('.toggle-btn');
      if (tBtn) tBtn.textContent = '▼ 詳細を見る';
    });
    
    if (isExpanded) {
      // 開いていた場合は閉じて背景を戻す
      card.classList.remove('expanded');
      btn.textContent = '▼ 詳細を見る';
      document.body.style.background = defaultBg;
    } else {
      // 閉じていた場合は開いて文字を切り替える
      card.classList.add('expanded');
      btn.textContent = '▲ 閉じる';
      document.body.style.background = `#000 url(${bg}) center center / cover no-repeat fixed`;
    }
  });
});

document.body.style.background = defaultBg;
</script>

<a href="index.html" class="back-home">ホームに戻る</a>

</body>
</html>
