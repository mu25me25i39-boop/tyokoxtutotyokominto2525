<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Music Archive</title>
  <link rel="stylesheet" href="assets/css/music.css">
</head>

<body>

<h1 class="title">Music Archive</h1>

<div class="music-list">

  <!-- ▼ カード1 -->
  <div class="music-card" data-bg="assets/img/music01.jpg">
    <div class="card-header">
      <h2>囚ワレノ花</h2>
      <button class="toggle-btn">詳細を見る</button>
    </div>

    <div class="card-detail">
      <p>テスト用の説明文です。</p>
      <a href="#" class="download-btn">DOWNLOAD</a>
      <button class="close-btn">閉じる</button>
    </div>
  </div>

</div>

<script>
// 背景画像セット
document.querySelectorAll('.music-card').forEach(card => {
  const bg = card.dataset.bg;
  card.style.setProperty('--bg', `url(${bg})`);
});

// 詳細を見る
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.closest('.music-card').classList.add('open');
  });
});

// 閉じる
document.querySelectorAll('.close-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.closest('.music-card').classList.remove('open');
  });
});
</script>

</body>
</html>
