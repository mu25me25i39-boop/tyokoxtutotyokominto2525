<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Music Archive</title>
  <link rel="stylesheet" href="assets/css/music.css">
</head>

<body>

<h1 class="title">Music Archive</h1>

<div class="music-list">

  <!-- ▼ カード1 -->
  <div class="music-card">
    <div class="card-header">
      <h2>囚ワレノ花</h2>
      <button class="toggle-btn" data-target="track01">詳細を見る</button>
    </div>

    <div id="track01" class="card-detail">
      <p>
        狂おしいほどの独占欲に囚われた少女が、  
        愛する彼女を甘美な檻に閉じ込める耽美な物語。
      </p>

      <a href="download/track01.html" class="download-btn">DOWNLOAD</a>
      <button class="close-btn" data-target="track01">閉じる</button>
    </div>
  </div>

  <!-- ▼ カード2 -->
  <div class="music-card">
    <div class="card-header">
      <h2>熱に沈む</h2>
      <button class="toggle-btn" data-target="track02">詳細を見る</button>
    </div>

    <div id="track02" class="card-detail">
      <p>
        静かに熱へ沈んでいくような、耽美で退廃的な世界観の楽曲。
      </p>

      <a href="download/track02.html" class="download-btn">DOWNLOAD</a>
      <button class="close-btn" data-target="track02">閉じる</button>
    </div>
  </div>

  <!-- ▼ カード3 -->
  <div class="music-card">
    <div class="card-header">
      <h2>空想愛</h2>
      <button class="toggle-btn" data-target="track03">詳細を見る</button>
    </div>

    <div id="track03" class="card-detail">
      <p>
        現実と妄想の境界で揺れる、甘くて少し痛い恋の物語。
      </p>

      <a href="download/track03.html" class="download-btn">DOWNLOAD</a>
      <button class="close-btn" data-target="track03">閉じる</button>
    </div>
  </div>

</div>

<script>
  // 詳細を見る → 展開
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.target;
      document.getElementById(id).classList.add('open');
    });
  });

  // 閉じる → 非表示
  document.querySelectorAll('.close-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.target;
      document.getElementById(id).classList.remove('open');
    });
  });
</script>

</body>
</html>
